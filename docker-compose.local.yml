# Local smoke test (not for Synology)
services:
  nas-downloader:
    build: .
    image: nas-downloader:local
    container_name: nas-downloader-local
    restart: "no"
    ports:
      - "8090:8080"
    environment:
      USERNAME: admin
      PASSWORD: "testpass"
      TZ: Europe/Warsaw
      MAX_CONCURRENT_GLOBAL: "2"
    volumes:
      - ./test-data:/data
      - ./test-state:/state
