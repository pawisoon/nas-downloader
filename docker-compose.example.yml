# Synology Portainer stack — paste in Editor, set PASSWORD, deploy.
services:
  nas-downloader:
    image: ghcr.io/pawisoon/nas-downloader:latest
    container_name: nas-downloader
    restart: unless-stopped
    ports:
      - "8090:8080"      # change 8090 if port taken
    environment:
      USERNAME: admin
      PASSWORD: "change-me"      # plain password — hashed on startup
      TZ: Europe/Warsaw
      MAX_CONCURRENT_GLOBAL: "4"
    volumes:
      - /volume1/downloads:/data                            # where files go
      - /volume1/docker/nas-downloader/state:/state         # SQLite + secrets
