{% extends "base.html" %}
{% block title %}{{ manifest.name }} – nas-downloader{% endblock %}

{% block content %}
<div x-data="manifestDetail({{ manifest | tojson(indent=None) | tojson }}, {{ jobs | map(attribute='to_dict') | list | tojson }})"
     x-init="init()">

  <!-- Header -->
  <div class="mb-6 flex flex-wrap items-start justify-between gap-4">
    <div>
      <div class="flex items-center gap-3 mb-1">
        <a href="/manifests" class="text-gray-400 hover:text-white text-sm">← Manifests</a>
      </div>
      <h1 class="text-xl font-bold text-white">{{ manifest.name }}</h1>
      <p class="text-sm text-gray-400 mt-0.5">→ {{ manifest.dest_root }}</p>
    </div>

    <div class="flex items-center gap-2 flex-wrap">
      <span class="inline-flex items-center rounded px-2 py-0.5 text-xs font-medium"
            :class="statusClass(manifestStatus)">
        <span x-text="manifestStatus"></span>
        <span x-show="sseConnected" class="ml-1.5 h-1.5 w-1.5 rounded-full bg-green-400 animate-pulse"></span>
      </span>

      <button @click="startOrResume()"
              x-show="['pending','failed','done','paused'].includes(manifestStatus)"
              class="rounded bg-green-700 px-3 py-1.5 text-xs font-medium hover:bg-green-600 transition-colors">
        <span x-text="manifestStatus === 'paused' ? 'Resume' : 'Start'"></span>
      </button>

      <button @click="pause()"
              x-show="manifestStatus === 'running'"
              class="rounded bg-yellow-700 px-3 py-1.5 text-xs font-medium hover:bg-yellow-600 transition-colors">
        Pause
      </button>

      <button @click="verify()"
              class="rounded bg-gray-700 px-3 py-1.5 text-xs font-medium hover:bg-gray-600 transition-colors">
        Verify
      </button>
    </div>
  </div>

  <!-- Summary bar -->
  <div class="mb-4 grid grid-cols-3 gap-3 sm:grid-cols-6">
    <template x-for="[label, key, color] in summaryDefs" :key="key">
      <div class="rounded bg-gray-800 border border-gray-700 px-3 py-2 text-center">
        <div class="text-lg font-bold" :class="color" x-text="counts[key] || 0"></div>
        <div class="text-xs text-gray-400 uppercase" x-text="label"></div>
      </div>
    </template>
  </div>

  <!-- Overall progress bar -->
  <div class="mb-6 h-2 rounded-full bg-gray-700 overflow-hidden">
    <div class="h-full rounded-full bg-indigo-500 transition-all duration-500"
         :style="`width: ${overallPct}%`"></div>
  </div>

  <!-- Alert banner -->
  <div x-show="alert" x-cloak
       class="mb-4 rounded border border-red-700 bg-red-900/50 px-4 py-2 text-sm text-red-200"
       x-text="alert"></div>

  <!-- Folder groups -->
  <template x-for="folder in sortedFolders" :key="folder">
    <div class="mb-4">
      <button @click="toggleFolder(folder)"
              class="flex w-full items-center gap-2 rounded-t bg-gray-800 border border-gray-700 px-4 py-2 text-left text-sm font-medium text-gray-300 hover:bg-gray-750">
        <span x-text="collapsedFolders[folder] ? '▶' : '▼'" class="text-xs text-gray-500"></span>
        <span class="font-mono" x-text="folder || '(root)'"></span>
        <span class="ml-auto text-xs text-gray-500"
              x-text="`${doneInFolder(folder)} / ${jobsByFolder[folder]?.length || 0} done`"></span>
      </button>

      <div x-show="!collapsedFolders[folder]"
           class="overflow-x-auto border border-t-0 border-gray-700 rounded-b">
        <table class="w-full text-xs">
          <thead class="bg-gray-800 text-gray-400">
            <tr>
              <th class="px-3 py-2 text-left w-1/3">File</th>
              <th class="px-3 py-2 text-left w-20">Status</th>
              <th class="px-3 py-2 text-left">Progress</th>
              <th class="px-3 py-2 text-right w-20">Size</th>
              <th class="px-3 py-2 text-right w-16">Speed</th>
              <th class="px-3 py-2 text-right w-16">ETA</th>
              <th class="px-3 py-2 text-right w-20">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-700/50">
            <template x-for="job in (jobsByFolder[folder] || [])" :key="job.id">
              <tr class="hover:bg-gray-800/50 transition-colors">
                <td class="px-3 py-2 font-mono max-w-0">
                  <div class="truncate" :title="job.dest" x-text="basename(job.dest)"></div>
                  <div x-show="job.last_error && !['pending','running'].includes(job.status)"
                       class="mt-0.5 text-red-400 truncate text-xs" :title="job.last_error"
                       x-text="job.last_error"></div>
                </td>
                <td class="px-3 py-2">
                  <span class="inline-flex items-center rounded px-1.5 py-0.5 font-medium"
                        :class="statusClass(job.status)"
                        x-text="manifestStatus === 'paused' && job.status === 'running' ? 'paused' : job.status">
                  </span>
                </td>
                <td class="px-3 py-2">
                  <div x-show="job.expected_bytes > 0" class="flex items-center gap-2">
                    <div class="flex-1 h-1.5 rounded-full bg-gray-700 min-w-16 overflow-hidden">
                      <div class="h-full rounded-full transition-all duration-300"
                           :class="job.status === 'done' || job.status === 'verified' ? 'bg-green-500' : 'bg-indigo-500'"
                           :style="`width: ${pct(job)}%`"></div>
                    </div>
                    <span class="text-gray-400 tabular-nums" x-text="`${pct(job)}%`"></span>
                  </div>
                  <div x-show="!job.expected_bytes && job.bytes_written > 0"
                       class="text-gray-400" x-text="fmtBytes(job.bytes_written)"></div>
                </td>
                <td class="px-3 py-2 text-right text-gray-400 tabular-nums">
                  <span x-show="job.expected_bytes > 0" x-text="fmtBytes(job.expected_bytes)"></span>
                  <span x-show="!job.expected_bytes">—</span>
                </td>
                <td class="px-3 py-2 text-right text-gray-400 tabular-nums"
                    x-text="job.status === 'running' ? fmtSpeed(job.speed_bps) : '—'"></td>
                <td class="px-3 py-2 text-right text-gray-400 tabular-nums"
                    x-text="job.status === 'running' && job.eta_sec ? fmtEta(job.eta_sec) : '—'"></td>
                <td class="px-3 py-2 text-right space-x-1">
                  <button x-show="job.status === 'failed' || job.status === 'corrupt'"
                          @click="retryJob(job.id)"
                          class="rounded bg-indigo-800 px-2 py-0.5 text-xs hover:bg-indigo-700">Retry</button>
                  <button x-show="job.status === 'running' || job.status === 'pending'"
                          @click="cancelJob(job.id)"
                          class="rounded bg-gray-700 px-2 py-0.5 text-xs hover:bg-gray-600">Cancel</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </template>

</div>

<script>
function manifestDetail(manifestJson, jobsJson) {
  const manifest = JSON.parse(manifestJson)
  const initialJobs = JSON.parse(jobsJson)

  return {
    manifestId: manifest.id,
    manifestStatus: manifest.status,
    sseConnected: false,
    alert: '',
    collapsedFolders: {},
    jobs: {},          // keyed by job.id
    jobsByFolder: {},  // folder → [job, ...]
    sortedFolders: [],
    counts: {},
    summaryDefs: [
      ['Pending',  'pending',  'text-gray-300'],
      ['Running',  'running',  'text-blue-400'],
      ['Done',     'done',     'text-green-400'],
      ['Failed',   'failed',   'text-red-400'],
      ['Verified', 'verified', 'text-emerald-400'],
      ['Corrupt',  'corrupt',  'text-orange-400'],
    ],

    init() {
      // Hydrate from server-rendered data
      for (const job of initialJobs) {
        job.speed_bps = 0
        job.eta_sec = 0
        this.jobs[job.id] = job
      }
      this._rebuildFolders()
      this._rebuildCounts()
      this._connectSSE()
    },

    _connectSSE() {
      const es = new EventSource(`/api/events?manifest=${this.manifestId}`)
      es.onopen = () => { this.sseConnected = true }
      es.onerror = () => {
        this.sseConnected = false
        setTimeout(() => this._connectSSE(), 4000)
        es.close()
      }
      es.onmessage = (e) => {
        try { this._handleEvent(JSON.parse(e.data)) } catch (_) {}
      }
    },

    _handleEvent(ev) {
      const j = this.jobs[ev.job_id]
      switch (ev.type) {
        case 'job_started':
          if (j) { j.status = 'running'; this._rebuildCounts() }
          this.manifestStatus = 'running'
          break
        case 'progress':
          if (j) {
            j.bytes_written = ev.bytes_written
            j.speed_bps = ev.speed_bps
            j.eta_sec = ev.eta_sec
          }
          break
        case 'job_done':
          if (j) { j.status = 'done'; j.bytes_written = ev.bytes; j.speed_bps = 0; j.eta_sec = 0; this._rebuildCounts() }
          break
        case 'job_failed':
          if (j) { j.status = 'failed'; j.last_error = ev.error; j.speed_bps = 0; j.eta_sec = 0; this._rebuildCounts() }
          break
        case 'job_skipped':
          if (j) { j.status = 'skipped'; j.speed_bps = 0; j.eta_sec = 0; this._rebuildCounts() }
          break
        case 'job_retry_scheduled':
          if (j) { j.status = 'pending'; j.last_error = ev.error; this._rebuildCounts() }
          break
        case 'verify_result':
          if (j) { j.status = ev.status; j.last_error = ev.ok ? '' : ev.reason; this._rebuildCounts() }
          break
        case 'manifest_done':
          this.manifestStatus = 'done'
          break
      }
    },

    _rebuildFolders() {
      this.jobsByFolder = {}
      for (const job of Object.values(this.jobs)) {
        const parts = job.dest.replace(/\\/g, '/').split('/')
        const folder = parts.length > 1 ? parts.slice(0, -1).join('/') : ''
        if (!this.jobsByFolder[folder]) this.jobsByFolder[folder] = []
        this.jobsByFolder[folder].push(job)
      }
      this.sortedFolders = Object.keys(this.jobsByFolder).sort()
    },

    _rebuildCounts() {
      const c = {}
      for (const j of Object.values(this.jobs)) {
        c[j.status] = (c[j.status] || 0) + 1
      }
      this.counts = c
    },

    get overallPct() {
      const total = Object.values(this.jobs).length
      if (!total) return 0
      const done = (this.counts.done || 0) + (this.counts.verified || 0) + (this.counts.skipped || 0)
      return Math.round(done / total * 100)
    },

    doneInFolder(folder) {
      return (this.jobsByFolder[folder] || []).filter(j =>
        ['done','verified','skipped'].includes(j.status)
      ).length
    },

    toggleFolder(folder) {
      this.collapsedFolders[folder] = !this.collapsedFolders[folder]
    },

    pct(job) {
      if (!job.expected_bytes) return 0
      return Math.min(100, Math.round(job.bytes_written / job.expected_bytes * 100))
    },

    basename(dest) {
      return dest.replace(/\\/g, '/').split('/').pop()
    },

    fmtBytes(b) {
      if (!b) return '—'
      if (b >= 1e9) return (b / 1e9).toFixed(2) + ' GB'
      if (b >= 1e6) return (b / 1e6).toFixed(1) + ' MB'
      return Math.round(b / 1e3) + ' KB'
    },

    fmtSpeed(bps) {
      if (!bps) return '—'
      return this.fmtBytes(bps) + '/s'
    },

    fmtEta(sec) {
      if (!sec) return '—'
      if (sec >= 3600) return `${Math.floor(sec / 3600)}h ${Math.floor((sec % 3600) / 60)}m`
      if (sec >= 60)   return `${Math.floor(sec / 60)}m ${sec % 60}s`
      return `${sec}s`
    },

    statusClass(status) {
      const map = {
        pending:  'bg-gray-700 text-gray-300',
        running:  'bg-blue-800 text-blue-200',
        done:     'bg-green-800 text-green-200',
        failed:   'bg-red-800 text-red-200',
        skipped:  'bg-yellow-800 text-yellow-200',
        paused:   'bg-yellow-800 text-yellow-200',
        verified: 'bg-emerald-800 text-emerald-200',
        corrupt:  'bg-orange-800 text-orange-200',
      }
      return map[status] || 'bg-gray-700 text-gray-300'
    },

    async startOrResume() {
      const r = await apiFetch(`/api/manifests/${this.manifestId}/start`, { method: 'POST' })
      if (r.ok) { this.manifestStatus = 'running'; this.alert = '' }
      else { const d = await r.json(); this.alert = d.error || 'Start failed' }
    },

    async pause() {
      const r = await apiFetch(`/api/manifests/${this.manifestId}/pause`, { method: 'POST' })
      if (r.ok) this.manifestStatus = 'paused'
    },

    async verify() {
      const r = await apiFetch(`/api/manifests/${this.manifestId}/verify`, { method: 'POST' })
      if (r.ok) { const d = await r.json(); this.alert = `Verify: ${d.verified} ok, ${d.corrupt} corrupt, ${d.missing} missing` }
    },

    async retryJob(jobId) {
      await apiFetch(`/api/jobs/${jobId}/retry`, { method: 'POST' })
      const j = this.jobs[jobId]
      if (j) { j.status = 'pending'; j.last_error = ''; this._rebuildCounts() }
    },

    async cancelJob(jobId) {
      await apiFetch(`/api/jobs/${jobId}/cancel`, { method: 'POST' })
    },
  }
}
</script>
{% endblock %}
