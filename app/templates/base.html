<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}nas-downloader{% endblock %}</title>

  {% if config.TAILWIND_CDN %}
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  {% else %}
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.min.css') }}">
  {% endif %}

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script>
    // Apply saved theme before render to prevent flash
    (function () {
      if (localStorage.getItem('theme') !== 'light') {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    })();

    function toggleTheme() {
      const html = document.documentElement
      const isDark = html.classList.toggle('dark')
      localStorage.setItem('theme', isDark ? 'dark' : 'light')
    }

    // Global fetch helper that injects CSRF token
    function apiFetch(url, opts = {}) {
      const token = document.querySelector('meta[name="csrf-token"]')?.content || ''
      return fetch(url, {
        ...opts,
        headers: { 'X-CSRFToken': token, 'Content-Type': 'application/json', ...(opts.headers || {}) },
      })
    }
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

  <nav class="border-b border-gray-700 bg-gray-800 px-4 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="/manifests" class="text-lg font-semibold tracking-tight text-white hover:text-indigo-300">
        nas-downloader
      </a>
      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" class="text-gray-400 hover:text-white text-xl" title="Toggle dark/light">☀</button>
        {% if current_user.is_authenticated %}
        <form method="post" action="/logout" class="inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="text-sm text-gray-400 hover:text-white">Logout</button>
        </form>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-6">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="mb-4 rounded px-4 py-2 text-sm
        {% if category == 'error' %}bg-red-800 text-red-100{% else %}bg-green-800 text-green-100{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
